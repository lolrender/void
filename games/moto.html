<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>void / moto</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;

  opacity: 0;
  transition: opacity 0.4s ease;
}

body.loaded {
  opacity: 1;
}

/* TOP BAR */

.topbar {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  padding: 12px 16px;

  font-size: 11px;
  letter-spacing: 2px;

  background: rgba(0,0,0,0.6);

  display: flex;
  align-items: center;
  gap: 14px;

  z-index: 1000;
}

.brand {
  color: #888;
}

/* BACK BUTTON */

.back {
  color: #666;
  text-decoration: none;

  transition: 0.2s ease;
}

.back:hover {
  color: #fff;
  transform: translateX(-2px);
}

/* GAME WINDOW */

.game {
  position: absolute;
  top: 40px;
  left: 0;

  width: 100%;
  height: calc(100% - 40px);

  border: none;
}

/* LOADING SCREEN */

#loading {
  position: fixed;
  inset: 0;

  background: #000;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 11px;
  letter-spacing: 3px;
  color: #777;

  z-index: 9999;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <!-- back button FIRST -->
  <a class="back" href="../index.html">← back</a>

  <span class="brand">void™ by jp</span>

</div>

<!-- LOADING SCREEN -->
<div id="loading">loading</div>

<!-- GAME -->
<iframe class="game" src="96.html"></iframe>

<script>

/* FADE IN PAGE */
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

/* HIDE LOADING AFTER GAME LOADS */
const iframe = document.querySelector(".game");
const loading = document.getElementById("loading");

iframe.addEventListener("load", () => {
  setTimeout(() => {
    loading.style.display = "none";
  }, 400);
});

</script>

</body>
</html>
