<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
}


#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #000;
}

.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  opacity: 0.35;
}


#boot {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.logo {
  font-size: 42px;
  letter-spacing: 14px;
}

.slogan {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 3px;
  color: #aaa;
}

.progress {
  width: 180px;
  height: 1px;
  background: #222;
  margin-top: 25px;
  overflow: hidden;
}

.bar {
  width: 0%;
  height: 100%;
  background: #fff;
  animation: load 2.5s linear forwards;
}

@keyframes load {
  to { width: 100%; }
}


main {
  display: none;
  padding: 80px 30px;
  max-width: 900px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}


header {
  text-align: center;
  margin-bottom: 60px;
}

h1 {
  font-size: 60px;
  letter-spacing: 14px;
  font-weight: 300;
}

.sub {
  font-size: 11px;
  letter-spacing: 3px;
  color: #888;
  margin-top: 10px;
}


.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
}


.card {
  border: 1px solid #222;
  padding: 16px;
  text-decoration: none;
  color: #fff;
  transition: 0.2s;
}

.card:hover {
  border-color: #fff;
}

.title {
  font-size: 13px;
  letter-spacing: 1px;
}

.tag {
  font-size: 10px;
  color: #777;
  margin-top: 6px;
}
</style>

</head>

<body>


<div id="stars"></div>


<div id="boot">
  <div class="logo">void</div>
  <div class="slogan">quinny was here 🤮</div>
  <div class="progress"><div class="bar"></div></div>
</div>


<main id="main">

  <header>
    <h1>void</h1>
    <div class="sub">library index</div>
  </header>

  <div class="grid">

    <a class="card" href="games/moto.html">
      <div class="title">X3</div>
      <div class="tag">Moto</div>
    </a>

    <a class="card" href="games/pong.html">
      <div class="title">EMPTY</div>
      <div class="tag">slot</div>
    </a>

    <a class="card" href="games/clicker.html">
      <div class="title">EMPTY</div>
      <div class="tag">slot</div>
    </a>

    <a class="card" href="#">
      <div class="title">EMPTY</div>
      <div class="tag">slot</div>
    </a>

  </div>

</main>

<script>

setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2600);

const starContainer = document.getElementById("stars");

for (let i = 0; i < 140; i++) {
  const star = document.createElement("div");
  star.className = "star";

  const size = Math.random() * 2;
  star.style.width = size + "px";
  star.style.height = size + "px";

  star.style.top = Math.random() * 100 + "%";
  star.style.left = Math.random() * 100 + "%";

  star.style.opacity = Math.random() * 0.5;

  starContainer.appendChild(star);
}
</script>

</body>
</html>
