<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void / play</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40px;

  display: flex;
  align-items: center;
  gap: 14px;

  padding: 0 14px;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}

.back {
  color: #777;
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 2px;
}

.back:hover {
  color: white;
}

.brand {
  color: #555;
  font-size: 11px;
  letter-spacing: 2px;
}

/* GAME WRAPPER (FIXES FULLSCREEN BUGS) */
.game-wrap {
  position: fixed;
  top: 40px;
  left: 0;

  width: 100vw;
  height: calc(100vh - 40px);

  overflow: hidden;
}

/* GAME */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* LOADING */
#loading {
  position: fixed;
  inset: 0;
  background: black;

  display: flex;
  justify-content: center;
  align-items: center;

  color: #777;
  font-size: 11px;
  letter-spacing: 3px;

  z-index: 999;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="games.html">← back</a>
  <div class="brand">made by jp</div>
</div>

<div class="game-wrap">
  <iframe id="game"></iframe>
</div>

<div id="loading">LOADING</div>

<script src="system/games.js"></script>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");

const game = games.find(g => g.id === id);

const iframe = document.getElementById("game");
const loading = document.getElementById("loading");

if (!game) {
  loading.innerHTML = "GAME NOT FOUND";
} else {
  iframe.src = "games/" + game.id + "/index.html";
}

iframe.onload = () => {
  setTimeout(() => {
    loading.style.display = "none";
  }, 300);
};

setTimeout(() => {
  if (loading.style.display !== "none") {
    loading.innerHTML = "TAKING TOO LONG...";
  }
}, 8000);

/* AUDIO FIX */
document.addEventListener("click", () => {
  const AudioContext = window.AudioContext || window.webkitAudioContext;

  if (!AudioContext) return;

  const ctx = new AudioContext();

  if (ctx.state === "suspended") {
    ctx.resume();
  }
}, { once: true });
</script>

</body>
</html>
