<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>void</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* PAGE */

body {

  background: #000;
  color: #fff;

  overflow-x: hidden;

  opacity: 0;
  transition: opacity 0.4s ease;
}

<a href="games.html" style="color:#aaa; font-size:12px; text-decoration:none;">
  browse games →
</a>
  
body.loaded {
  opacity: 1;
}

/* STARS */

#stars {

  position: fixed;
  inset: 0;

  z-index: 0;
}

.star {

  position: absolute;

  background: #fff;

  border-radius: 50%;

  opacity: 0.35;

  animation: twinkle 4s infinite ease-in-out;
}

@keyframes twinkle {

  0%,100% {
    opacity: 0.15;
  }

  50% {
    opacity: 0.5;
  }

}

/* BOOT */

#boot {

  position: fixed;
  inset: 0;

  background: #000;

  display: flex;
  flex-direction: column;

  justify-content: center;
  align-items: center;

  z-index: 10;

  transition: opacity 0.5s ease;
}

.logo {

  font-size: 42px;

  letter-spacing: 14px;

  text-transform: lowercase;
}

.slogan {

  margin-top: 12px;

  font-size: 14px;

  letter-spacing: 3px;

  color: #aaa;
}

.progress {

  width: 180px;
  height: 1px;

  background: #222;

  margin-top: 25px;

  overflow: hidden;
}

.bar {

  width: 0%;
  height: 100%;

  background: #fff;

  animation: load 3s linear forwards;
}

@keyframes load {

  to {
    width: 100%;
  }

}

/* MAIN */

main {

  display: none;

  padding: 80px 30px;

  max-width: 900px;

  margin: 0 auto;

  position: relative;

  z-index: 2;
}

header {

  text-align: center;

  margin-bottom: 60px;
}

h1 {

  font-size: 60px;

  letter-spacing: 14px;

  font-weight: 300;

  text-transform: lowercase;
}

.sub {

  margin-top: 10px;

  font-size: 11px;

  letter-spacing: 3px;

  color: #888;
}

/* GRID */

.grid {

  display: grid;

  grid-template-columns:
  repeat(auto-fit, minmax(160px, 1fr));

  gap: 14px;
}

/* CARD */

.card {
  position: relative;
  display: block;

  border: 1px solid #222;
  border-radius: 10px;

  overflow: hidden;

  text-decoration: none;
  color: #fff;

  background: #0a0a0a;

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
  
.card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 0 25px rgba(255,255,255,0.12);
  border-color: #555;
}

.card:hover .thumb {
  transform: scale(1.08);
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;

  object-fit: cover;
  object-position: center;

  display: block;

  transition: transform 0.25s ease;
}

.title {

  font-size: 13px;

  letter-spacing: 1px;
}

.tag {

  margin-top: 6px;

  font-size: 10px;

  color: #777;
}

/* VERSION */

.version {

  position: fixed;

  bottom: 10px;
  right: 14px;

  font-size: 10px;

  letter-spacing: 2px;

  color: #222;
}

</style>

</head>

<body>

<div id="stars"></div>

<div id="boot">

  <div class="logo">
    void
  </div>

  <div class="slogan"></div>

  <div class="progress">
    <div class="bar"></div>
  </div>

</div>

<main id="main">

<header>

  <h1>void</h1>

  <div class="sub">
    games
  </div>

</header>

<div class="grid" id="grid"></div>

</main>

<div class="version">
VOID / 2.0
</div>

<script src="system/games.js"></script>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");

  document.getElementById("boot").style.display = "none";
  document.getElementById("main").style.display = "block";
});
</script>

</body>
</html>
