<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void / moto</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;

  opacity: 0;
  transition: opacity 0.4s ease;
}

body.loaded {
  opacity: 1;
}

/* TOP BAR */

.topbar {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  padding: 12px 16px;

  font-size: 11px;
  letter-spacing: 2px;

  background: rgba(0,0,0,0.6);

  display: flex;
  align-items: center;
  gap: 14px;

  z-index: 100;
}

.brand {
  color: #888;
}

.back {
  color: #666;
  text-decoration: none;
  transition: 0.2s ease;
}

.back:hover {
  color: #fff;
  transform: translateX(-2px);
}

/* GAME */

iframe {
  position: absolute;
  top: 40px;
  left: 0;

  width: 100%;
  height: calc(100% - 40px);

  border: none;
}
</style>
</head>

<body>

<div class="topbar">

  <a class="back" href="../index.html">← back</a>

  <span class="brand">void™ by jp</span>

</div>

<iframe src="https://motox3m2.io/"></iframe>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
